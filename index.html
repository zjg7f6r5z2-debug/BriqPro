<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"/>
<meta name="theme-color" content="#000000"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="BRIQPRO"/>
<link rel="manifest" href="manifest.webmanifest"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<title>BRIQPRO — Gestão de Revenda para Revendedores</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --bg:#000000;--bg-grad:radial-gradient(1200px 600px at 80% -10%,rgba(1,227,119,.10),transparent 60%),radial-gradient(900px 500px at -10% 10%,rgba(45,212,167,.08),transparent 55%);
  --surface:#0C100E;--surface-2:#131815;--surface-3:#1B221D;
  --border:rgba(255,255,255,.07);--border-strong:rgba(255,255,255,.12);
  --text:#E8ECF4;--text-2:#8A94A6;--text-3:#5B6577;
  --profit:#2DD4A7;--profit-soft:rgba(45,212,167,.14);
  --brand:#01E377;--brand-soft:rgba(1,227,119,.14);
  --amber:#F5B544;--amber-soft:rgba(245,181,68,.14);
  --loss:#F26D6D;--loss-soft:rgba(242,109,109,.14);
  --shadow:0 18px 40px -18px rgba(0,0,0,.6);
}
:root.light{
  --bg:#F4F6FA;--bg-grad:radial-gradient(1100px 560px at 85% -10%,rgba(1,227,119,.10),transparent 60%),radial-gradient(820px 460px at -8% 8%,rgba(45,212,167,.10),transparent 55%);
  --surface:#FFF;--surface-2:#FFF;--surface-3:#F1F4F9;
  --border:rgba(15,23,42,.08);--border-strong:rgba(15,23,42,.14);
  --text:#0F172A;--text-2:#5B6472;--text-3:#94A0B2;
  --profit:#0EA47C;--profit-soft:rgba(14,164,124,.12);
  --brand:#03C268;--brand-soft:rgba(3,194,104,.12);
  --amber:#D8920F;--amber-soft:rgba(216,146,15,.12);
  --loss:#E2484B;--loss-soft:rgba(226,72,75,.10);
  --shadow:0 20px 44px -22px rgba(15,23,42,.30);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);background-image:var(--bg-grad);background-attachment:fixed;color:var(--text);-webkit-font-smoothing:antialiased;line-height:1.5;transition:background-color .4s,color .25s}
.num{font-variant-numeric:tabular-nums}
.display,h1,h2,h3,h4{font-family:'Space Grotesk',sans-serif;letter-spacing:-.02em;margin:0}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:15px}
a{color:var(--brand);text-decoration:none}
::-webkit-scrollbar{width:9px;height:9px}::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:20px}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
.hidden{display:none!important}

/* AUTH */
#auth{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:24px;z-index:60}
.auth-card{width:100%;max-width:392px;background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:34px 28px;box-shadow:var(--shadow);animation:pop .5s cubic-bezier(.2,.9,.3,1.2)}
@keyframes pop{from{opacity:0;transform:translateY(14px) scale(.97)}to{opacity:1;transform:none}}
.logo-mark{width:56px;height:56px;border-radius:16px;display:grid;place-items:center;background:linear-gradient(135deg,var(--brand),var(--profit));font-family:'Space Grotesk';font-weight:700;font-size:26px;color:#fff;box-shadow:0 10px 26px -8px var(--brand)}
.field{margin-top:15px}
.field label,.lbl{display:block;font-size:12.5px;font-weight:600;color:var(--text-2);margin-bottom:7px}
.input{width:100%;padding:12px 14px;background:var(--surface-3);border:1px solid var(--border);border-radius:12px;color:var(--text);outline:none;transition:border-color .2s,box-shadow .2s}
.input:focus{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-soft)}
textarea.input{resize:vertical;min-height:70px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 18px;border-radius:12px;font-weight:600;font-size:14.5px;transition:transform .12s,filter .2s}
.btn:active{transform:scale(.97)}
.btn-primary{background:linear-gradient(135deg,var(--brand),#04B45F);color:#fff;width:100%;box-shadow:0 12px 26px -12px var(--brand)}
.btn-primary:hover{filter:brightness(1.06)}
.btn-ghost{background:var(--surface-3);border:1px solid var(--border);color:var(--text)}
.btn-ghost:hover{border-color:var(--border-strong)}
.btn-sm{padding:8px 13px;font-size:13px;border-radius:10px}
.err{color:var(--loss);font-size:13px;margin-top:10px;min-height:18px}
.ok{color:var(--profit)}

/* SHELL */
#app{display:none;min-height:100vh}
.shell{display:flex;min-height:100vh}
.sidebar{display:none}
@media(min-width:920px){.sidebar{display:flex;flex-direction:column;width:248px;flex:0 0 248px;padding:22px 16px;gap:5px;position:sticky;top:0;height:100vh;border-right:1px solid var(--border);overflow:auto}.main{flex:1;min-width:0}}
.brand-row{display:flex;align-items:center;gap:11px;padding:6px 8px 16px}
.brand-row .logo-mark{width:40px;height:40px;font-size:19px;border-radius:12px}
.brand-row b{font-family:'Space Grotesk';font-size:18px}.brand-row span{display:block;font-size:11px;color:var(--text-2);font-weight:500}
.navbtn{display:flex;align-items:center;gap:12px;padding:10px 13px;border-radius:11px;color:var(--text-2);font-weight:500;font-size:14px;width:100%;text-align:left;transition:.18s}
.navbtn svg{width:19px;height:19px;flex:0 0 19px}
.navbtn:hover{background:var(--surface-2);color:var(--text)}
.navbtn.active{background:var(--brand-soft);color:var(--brand);font-weight:600}
.sidebar-foot{margin-top:auto;display:flex;flex-direction:column;gap:5px;padding-top:8px}
.main{padding:0 0 110px}
.topbar{position:sticky;top:0;z-index:30;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:15px 18px;backdrop-filter:blur(14px);background:color-mix(in srgb,var(--bg) 80%,transparent);border-bottom:1px solid var(--border)}
.topbar h2{font-size:20px}.topbar .sub{font-size:12px;color:var(--text-2);font-weight:500}
.top-actions{display:flex;gap:8px;align-items:center}
.icon-btn{width:40px;height:40px;border-radius:11px;display:grid;place-items:center;background:var(--surface-2);border:1px solid var(--border);color:var(--text-2);transition:.18s;position:relative}
.icon-btn:hover{color:var(--text);border-color:var(--border-strong)}.icon-btn svg{width:19px;height:19px}
.dotbadge{position:absolute;top:7px;right:8px;width:8px;height:8px;border-radius:50%;background:var(--loss)}
.content{padding:18px;max-width:1180px;margin:0 auto;animation:fade .35s}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

.grid{display:grid;gap:14px}
.kpis{grid-template-columns:repeat(2,1fr)}
@media(min-width:680px){.kpis{grid-template-columns:repeat(3,1fr)}}
@media(min-width:1000px){.kpis{grid-template-columns:repeat(4,1fr)}}
.card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:18px;transition:transform .18s,border-color .18s}
.card.hover:hover{transform:translateY(-3px);border-color:var(--border-strong)}
.kpi .lab{font-size:11.5px;color:var(--text-2);font-weight:600}
.kpi .val{font-family:'Space Grotesk';font-size:23px;font-weight:600;margin-top:8px}
.kpi .delta{font-size:11.5px;font-weight:600;margin-top:5px}
.up{color:var(--profit)}.down{color:var(--loss)}.neu{color:var(--text-2)}
.hero{grid-column:1/-1;background:linear-gradient(135deg,var(--surface),var(--surface-2));border:1px solid var(--border);border-radius:22px;padding:22px;position:relative;overflow:hidden}
.hero::after{content:"";position:absolute;right:-40px;top:-60px;width:240px;height:240px;background:radial-gradient(circle,var(--profit-soft),transparent 70%);pointer-events:none}
.hero .lab{font-size:12.5px;color:var(--text-2);font-weight:600;display:flex;gap:8px;align-items:center}
.hero .big{font-family:'Space Grotesk';font-size:40px;font-weight:700;margin-top:6px}
@media(max-width:520px){.hero .big{font-size:32px}}
.hero .row{display:flex;gap:20px;flex-wrap:wrap;margin-top:13px}
.hero .mini b{font-family:'Space Grotesk';font-size:16px;display:block}.hero .mini span{font-size:11px;color:var(--text-2)}
.dot{width:8px;height:8px;border-radius:50%}
.sec-title{display:flex;align-items:center;justify-content:space-between;margin:24px 2px 12px}
.sec-title h3{font-size:15.5px}.sec-title .hint{font-size:12px;color:var(--text-3)}
.charts{grid-template-columns:1fr}@media(min-width:880px){.charts{grid-template-columns:1fr 1fr}}
.chart-card h4{font-size:13px;color:var(--text-2);font-weight:600;margin-bottom:12px}
.chart-wrap{position:relative;height:200px}

.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
.toolbar .input{flex:1;min-width:150px;padding:10px 12px}
.seg{display:flex;gap:4px;background:var(--surface-2);border:1px solid var(--border);border-radius:11px;padding:4px;overflow-x:auto}
.seg button{padding:7px 12px;border-radius:8px;font-size:12.5px;font-weight:600;color:var(--text-2);white-space:nowrap}
.seg button.on{background:var(--brand);color:#fff}
.plist{display:grid;gap:12px;grid-template-columns:1fr}
@media(min-width:680px){.plist{grid-template-columns:1fr 1fr}}@media(min-width:1040px){.plist{grid-template-columns:1fr 1fr 1fr}}
.pcard{display:flex;flex-direction:column;cursor:pointer}
.pcard .thumb{height:128px;border-radius:13px;background:var(--surface-3);background-size:cover;background-position:center;display:grid;place-items:center;color:var(--text-3);position:relative;overflow:hidden}
.pcard .thumb svg{width:32px;height:32px;opacity:.5}
.badge{position:absolute;top:9px;left:9px;font-size:10px;font-weight:700;padding:4px 9px;border-radius:20px;backdrop-filter:blur(6px)}
.score{position:absolute;top:9px;right:9px;font-size:11px;font-weight:800;padding:4px 8px;border-radius:9px;font-family:'Space Grotesk'}
.pcard h4{font-size:14.5px;margin-top:11px}.pcard .meta{font-size:12px;color:var(--text-2);margin-top:3px}
.pcard .nums{display:flex;justify-content:space-between;margin-top:11px;padding-top:11px;border-top:1px solid var(--border)}
.pcard .nums b{font-family:'Space Grotesk';font-size:14.5px;display:block}.pcard .nums span{font-size:11px;color:var(--text-2)}
.stale{outline:1.5px solid var(--loss);outline-offset:-1px}
.st-comprado,.st-preparacao{background:var(--brand-soft);color:var(--brand)}
.st-manutencao,.st-reservado{background:var(--amber-soft);color:var(--amber)}
.st-anunciado{background:var(--profit-soft);color:var(--profit)}
.st-negociacao{background:var(--amber-soft);color:var(--amber)}
.st-vendido,.st-arquivado,.st-cancelado{background:var(--surface-3);color:var(--text-2)}
.sc-Excepcional{background:var(--profit);color:#06251c}.sc-Excelente{background:var(--profit-soft);color:var(--profit)}
.sc-Bom{background:var(--brand-soft);color:var(--brand)}.sc-Fraco{background:var(--amber-soft);color:var(--amber)}.sc-Evitar{background:var(--loss-soft);color:var(--loss)}
.empty{text-align:center;padding:54px 20px;color:var(--text-2)}
.empty svg{width:44px;height:44px;opacity:.4;margin-bottom:12px}
.empty b{display:block;color:var(--text);font-family:'Space Grotesk';font-size:17px;margin-bottom:5px}

.tbl{width:100%;border-collapse:collapse;font-size:13.5px}
.tbl th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--text-3);font-weight:700;padding:10px 12px;border-bottom:1px solid var(--border)}
.tbl td{padding:11px 12px;border-bottom:1px solid var(--border)}.tbl tr:last-child td{border-bottom:none}
.scroll-x{overflow-x:auto;border-radius:14px}
.pill{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px}
.prog{height:10px;background:var(--surface-3);border-radius:20px;overflow:hidden;margin-top:9px}
.prog>i{display:block;height:100%;border-radius:20px;background:linear-gradient(90deg,var(--brand),var(--profit));transition:width .9s cubic-bezier(.2,.9,.3,1)}
.insight{display:flex;gap:13px;align-items:flex-start;padding:15px;border-radius:14px;background:var(--surface);border:1px solid var(--border);margin-bottom:11px}
.insight .ic{width:38px;height:38px;border-radius:11px;flex:0 0 38px;display:grid;place-items:center;font-size:18px}
.insight b{font-size:14px}.insight p{margin:3px 0 0;font-size:13px;color:var(--text-2)}
.rank{display:flex;align-items:center;gap:13px;padding:11px 0;border-bottom:1px solid var(--border)}.rank:last-child{border-bottom:none}
.rank .pos{width:26px;height:26px;border-radius:8px;display:grid;place-items:center;font-family:'Space Grotesk';font-weight:700;font-size:13px;background:var(--surface-3);color:var(--text-2)}
.rank .pos.gold{background:linear-gradient(135deg,#f5c451,#e09a18);color:#3a2a00}
.rank b{font-size:14px}.rank small{color:var(--text-2);font-size:12px}.rank .v{margin-left:auto;font-family:'Space Grotesk';font-weight:600}

/* KANBAN */
.kanban{display:flex;gap:12px;overflow-x:auto;padding-bottom:8px}
.kcol{flex:0 0 250px;background:var(--surface-2);border:1px solid var(--border);border-radius:16px;padding:11px}
.kcol h4{font-size:12.5px;color:var(--text-2);display:flex;justify-content:space-between;margin-bottom:10px}
.kcard{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:11px;margin-bottom:9px;cursor:pointer;transition:.15s}
.kcard:hover{border-color:var(--border-strong)}
.kcard b{font-size:13.5px}.kcard .m{font-size:11.5px;color:var(--text-2);margin-top:3px}
.kcard .vv{font-family:'Space Grotesk';font-weight:600;font-size:13px;margin-top:6px}

.bottomnav{position:fixed;left:0;right:0;bottom:0;z-index:40;display:flex;justify-content:space-around;padding:8px 6px calc(8px + env(safe-area-inset-bottom));background:color-mix(in srgb,var(--bg) 86%,transparent);backdrop-filter:blur(18px);border-top:1px solid var(--border)}
@media(min-width:920px){.bottomnav{display:none}}
.bnav{display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;font-weight:600;color:var(--text-3);padding:5px 9px;border-radius:10px}
.bnav svg{width:22px;height:22px}.bnav.active{color:var(--brand)}
.fab{position:fixed;right:18px;bottom:calc(76px + env(safe-area-inset-bottom));z-index:41;width:56px;height:56px;border-radius:18px;background:linear-gradient(135deg,var(--brand),var(--profit));color:#fff;display:grid;place-items:center;box-shadow:0 16px 30px -10px var(--brand)}
.fab svg{width:26px;height:26px}@media(min-width:920px){.fab{bottom:24px}}

.overlay{position:fixed;inset:0;z-index:70;background:rgba(5,8,14,.55);backdrop-filter:blur(4px);display:none;align-items:flex-end;justify-content:center}
.overlay.open{display:flex;animation:fade .2s}
.modal{width:100%;max-width:580px;max-height:92vh;overflow:auto;background:var(--surface);border:1px solid var(--border);border-radius:22px 22px 0 0;padding:20px;animation:slideup .3s cubic-bezier(.2,.9,.3,1)}
@media(min-width:620px){.overlay{align-items:center}.modal{border-radius:22px}}
@keyframes slideup{from{transform:translateY(40px);opacity:.6}to{transform:none;opacity:1}}
.modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}.modal-head h3{font-size:19px}
.frow{display:grid;gap:12px;grid-template-columns:1fr 1fr;margin-top:14px}.frow .full{grid-column:1/-1}
@media(max-width:520px){.frow{grid-template-columns:1fr}}
.exp-item{display:flex;gap:8px;align-items:center;background:var(--surface-3);border-radius:11px;padding:9px 11px;margin-top:8px}
.exp-item .input{padding:8px 10px;font-size:13px}
.photos{display:flex;gap:9px;flex-wrap:wrap;margin-top:10px}
.photo{width:74px;height:74px;border-radius:11px;background-size:cover;background-position:center;position:relative;border:1px solid var(--border)}
.photo button{position:absolute;top:-7px;right:-7px;width:22px;height:22px;border-radius:50%;background:var(--loss);color:#fff;font-size:13px;display:grid;place-items:center}
.addphoto{width:74px;height:74px;border-radius:11px;border:1.5px dashed var(--border-strong);display:grid;place-items:center;color:var(--text-2)}
.modal-foot{display:flex;gap:10px;margin-top:20px;position:sticky;bottom:-20px;background:var(--surface);padding:8px 0 0}.modal-foot .btn{flex:1}
.dt-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin:14px 0}.dt-grid .k{font-size:11.5px;color:var(--text-2);font-weight:600}.dt-grid .v{font-family:'Space Grotesk';font-size:15px;margin-top:2px}
.detail-imgs{display:flex;gap:9px;overflow-x:auto;margin:-2px 0 12px}.detail-imgs img{height:148px;border-radius:13px;object-fit:cover}
.toast{position:fixed;left:50%;bottom:96px;transform:translateX(-50%);z-index:90;background:var(--surface);border:1px solid var(--border-strong);color:var(--text);padding:12px 18px;border-radius:13px;box-shadow:var(--shadow);font-size:13.5px;font-weight:600;opacity:0;transition:.3s;pointer-events:none}
.toast.show{opacity:1;bottom:108px}
.banner{background:var(--amber-soft);color:var(--amber);border:1px solid var(--amber);border-radius:12px;padding:11px 14px;font-size:12.5px;font-weight:600;margin-bottom:14px;display:flex;gap:9px;align-items:center}
.gauge{width:54px;height:54px;border-radius:50%;display:grid;place-items:center;font-family:'Space Grotesk';font-weight:700;font-size:15px}
.spinner{width:30px;height:30px;border:3px solid var(--border);border-top-color:var(--brand);border-radius:50%;animation:spin .8s linear infinite;margin:40px auto}
.menu-only{display:grid}@media(min-width:920px){.menu-only{display:none}}
@keyframes spin{to{transform:rotate(360deg)}}
@media(min-width:760px){#recvList,#supList,#oppList,#watchList,#muList{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:12px;align-items:start}#recvList>.card,#supList>.card,#oppList>.card,#watchList>.card,#muList>.card{margin-bottom:0!important}}@media(min-width:1280px){.content{max-width:1320px}}@media(min-width:1280px){#oppList,#watchList,#recvList,#supList,#muList{grid-template-columns:repeat(auto-fill,minmax(360px,1fr))}}</style>
</head>
<body>

<div id="auth">
  <div class="auth-card">
    <img src="logo.png" alt="BRIQ PRO" style="width:80%;max-width:260px;margin:4px auto 2px;display:block">
    <p id="authSub" style="color:var(--text-2);font-size:13.5px;margin:6px 0 4px">Gestão profissional de revenda.</p>
    <div id="authFields"></div>
    <div class="err" id="authMsg"></div>
    <button class="btn btn-primary" id="authBtn" style="margin-top:12px">Entrar</button>
    <p id="authToggle" style="text-align:center;margin-top:14px;font-size:13px;color:var(--text-3)"></p>
  </div>
</div>

<div id="app">
  <div class="shell">
    <aside class="sidebar">
      <div class="brand-row"><div class="logo-mark" style="background:#000;overflow:hidden;border:1px solid var(--border)"><img src="icon-192.png" alt="BP" style="width:100%;height:100%;object-fit:contain"></div><div><b>BRIQ<span style="color:var(--brand)">PRO</span></b><span id="sideUser">ERP</span></div></div>
      <nav id="navDesk"></nav>
      <div class="sidebar-foot">
        <button class="navbtn" id="themeBtnDesk"></button>
        <button class="navbtn" data-tab="config"></button>
        <button class="navbtn" id="logoutDesk" style="color:var(--loss)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg> Sair</button>
      </div>
    </aside>
    <div class="main">
      <div class="topbar">
        <div><h2 id="pageTitle">Dashboard</h2><div class="sub" id="pageSub"></div></div>

/* ============ PRODUCT MATH ============ */
function derive(p){
  const desp=S.expenses.filter(e=>e.product_id===p.id).reduce((s,e)=>s+numf(e.valor),0);
  const custo=numf(p.preco_pago)+desp;
  const sale=S.sales.find(s=>s.product_id===p.id);
  const o={despesas:desp,custo,sale};
  if(sale){
    o.vendido=true;o.receita=numf(sale.valor_vendido);
    o.lucroBruto=o.receita-numf(p.preco_pago);
    o.lucroLiq=o.receita-custo;
    o.roi=custo>0?o.lucroLiq/custo*100:0;
    o.margem=o.receita>0?o.lucroLiq/o.receita*100:0;
    o.diasVenda=Math.max(0,Math.floor((new Date(sale.data_venda)-new Date(p.data_compra))/86400000));
  }else{
    o.vendido=false;
    o.lucroPot=numf(p.valor_mercado)-custo;
    o.dias=daysSince(p.data_compra);
    o.stale=o.dias>(S.settings.stale_days||30);
  }
  return o;
}
function stats(){
  const ps=S.products, sold=ps.filter(p=>S.sales.find(s=>s.product_id===p.id));
  const stock=ps.filter(p=>!S.sales.find(s=>s.product_id===p.id)&&!['cancelado','arquivado'].includes(p.status));
  let custoVend=0,receita=0,lucro=0,custoTodos=0,diasVendaSum=0,diasEstSum=0;
  sold.forEach(p=>{const d=derive(p);custoVend+=d.custo;receita+=d.receita;lucro+=d.lucroLiq;diasVendaSum+=d.diasVenda;});
  ps.forEach(p=>{custoTodos+=derive(p).custo;});
  stock.forEach(p=>{diasEstSum+=derive(p).dias;});
  const estCusto=stock.reduce((s,p)=>s+derive(p).custo,0);
  const estMercado=stock.reduce((s,p)=>s+numf(p.valor_mercado),0);
  const aportes=S.cash.filter(c=>c.kind==='aporte').reduce((s,c)=>s+numf(c.valor),0);
  const retiradas=S.cash.filter(c=>c.kind==='retirada').reduce((s,c)=>s+numf(c.valor),0);
  const ajustes=S.cash.filter(c=>c.kind==='ajuste').reduce((s,c)=>s+numf(c.valor),0);
  const capIni=numf(S.settings.capital_inicial);
  const caixa=capIni+aportes-retiradas+ajustes-custoTodos+receita;
  const patrimonio=caixa+estMercado;
  const mk=monthKey(todayISO());
  const lucroMes=sold.filter(p=>monthKey(derive(p).sale.data_venda)===mk).reduce((s,p)=>s+derive(p).lucroLiq,0);
  const now=new Date(),wk=new Date(now);wk.setDate(now.getDate()-now.getDay());wk.setHours(0,0,0,0);
  const lucroSem=sold.filter(p=>new Date(derive(p).sale.data_venda+'T00:00:00')>=wk).reduce((s,p)=>s+derive(p).lucroLiq,0);
  const margens=sold.map(p=>derive(p).margem);
  const margemMedia=margens.length?margens.reduce((a,b)=>a+b,0)/margens.length:0;
  const leadsAtivos=S.negos.filter(n=>!['comprado','perdido'].includes(n.stage)).length;
  const conv=S.negos.length?S.negos.filter(n=>n.stage==='comprado').length/S.negos.length*100:0;
  const giro=estCusto>0?(receita/((estCusto+custoVend)/2||1)):0;
  return {sold,stock,custoVend,receita,lucro,estCusto,estMercado,aportes,retiradas,capIni,caixa,patrimonio,
    ticket:sold.length?receita/sold.length:0,roiMedio:custoVend>0?lucro/custoVend*100:0,margemMedia,
    lucroMes,lucroSem,lucroPot:estMercado-estCusto,tmVenda:sold.length?diasVendaSum/sold.length:0,
    tmEstoque:stock.length?diasEstSum/stock.length:0,leadsAtivos,conv,giro,custoTodos};
}

  const set=(id,m)=>{const e=$('#'+id);if(e)e.onclick=()=>{authMode=m;$('#authMsg').textContent='';renderAuth();};};
  set('t_login','login');set('t_reg','register');set('t_forgot','forgot');

  ($('#a_name')||$('#a_email')).focus();
}
async function doAuth(){
  const msg=$('#authMsg');msg.className='err';msg.textContent='';
  const email=($('#a_email')?.value||'').trim();
  if(!email){msg.textContent='Informe o email.';return;}
  $('#authBtn').textContent='Aguarde…';
  try{
    if(authMode==='forgot'){
      const {error}=await sb.auth.resetPasswordForEmail(email,{redirectTo:location.href});
      if(error)throw error;
      msg.className='err ok';msg.textContent='Link enviado. Verifique seu email.';
    }else if(authMode==='register'){
      const pw=$('#a_pw').value;if(pw.length<6){msg.textContent='Senha com ao menos 6 caracteres.';$('#authBtn').textContent='Criar conta';return;}
      const {data,error}=await sb.auth.signUp({email,password:pw,options:{data:{full_name:$('#a_name').value.trim()},emailRedirectTo:location.origin}});
      if(error)throw error;
      if(data.session){await onLogin();}
      else{msg.className='err ok';msg.textContent='Conta criada! Confirme pelo link enviado ao seu email e depois entre.';authMode='login';}
    }else{
      const {error}=await sb.auth.signInWithPassword({email,password:$('#a_pw').value});
      if(error)throw error;
      await onLogin();
    }
  }catch(e){msg.className='err';msg.textContent=traduz(e.message||'Erro');}
  if(authMode!=='login'||$('#auth').style.display!=='none')renderAuth();
}
function traduz(m){m=m||'Erro';var map={'Invalid login credentials':'Email ou senha incorretos.','Email not confirmed':'Email ainda não confirmado. Confirme pelo link ou desative a confirmação no Supabase.','User already registered':'Este email já tem conta. Faça login.','Signups not allowed for this instance':'Cadastro desativado no servidor (Supabase, Authentication).','Email logins are disabled':'Login por email desativado no servidor.'};if(map[m])return map[m];if(/confirmation email|sending.*email|error sending/i.test(m))return 'O servidor nao conseguiu enviar o email de confirmacao. Desative \u201cConfirm email\u201d no Supabase ou configure um SMTP.';if(/rate|too many|after \d+ second/i.test(m))return 'Muitas tentativas. Aguarde alguns minutos e tente novamente.';if(/database error/i.test(m))return 'Erro no servidor ao criar o usuario. Tente novamente.';if(/load failed|failed to fetch|networkerror|network request/i.test(m))return 'Sem conexao com o servidor. O preview do app bloqueia chamadas externas, abra pelo endereco publicado (Vercel) ou em um navegador (Safari/Chrome).';return m;}

function patrimSeries(){

function bindForm(){
  paintPhotos();paintExps();liveScore();
  $('#addExp').onclick=()=>{draft._exp.push({id:null,_tmp:uidStr(),descricao:'',data:todayISO(),valor:''});paintExps();};
  $('#saveProd').onclick=saveProduct;
  const inp=document.createElement('input');inp.type='file';inp.accept='image/*';inp.multiple=true;inp.style.display='none';
  inp.onchange=async e=>{for(const f of e.target.files){if((draft._newPhotos.length+(countExistingPhotos()))>=8){toast('Máximo de 8 fotos');break;}const b=await compressBlob(f,1280,.72);const url=URL.createObjectURL(b);draft._newPhotos.push({blob:b,url});}paintPhotos();};
  document.body.appendChild(inp);draft._inp=inp;
}
function countExistingPhotos(){return draft.cover_url?1:0;}
function paintPhotos(){
  const c=$('#photos');if(!c)return;
  const existing=draft.cover_url?[`<div class="photo" style="background-image:url('${esc(draft.cover_url)}')"><button onclick="rmCover()">×</button></div>`]:[];
  const news=draft._newPhotos.map((p,i)=>`<div class="photo" style="background-image:url('${p.url}')"><button onclick="rmNew(${i})">×</button></div>`);
  c.innerHTML=existing.concat(news).join('')+`<button class="addphoto" id="pickPhoto"><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg></button>`;
  $('#pickPhoto').onclick=()=>draft._inp.click();
}
function rmCover(){draft.cover_url='';paintPhotos();}
function rmNew(i){draft._newPhotos.splice(i,1);paintPhotos();}
function paintExps(){
  const c=$('#exps');if(!c)return;
  c.innerHTML=draft._exp.map((e,i)=>`<div class="exp-item">
    <input class="input" style="flex:2" placeholder="Descrição" value="${esc(e.descricao)}" oninput="draft._exp[${i}].descricao=this.value">
    <input class="input" type="date" style="flex:1.2" value="${e.data||todayISO()}" oninput="draft._exp[${i}].data=this.value">
    <input class="input num" type="number" step="0.01" style="flex:1" placeholder="R$" value="${e.valor}" oninput="draft._exp[${i}].valor=this.value;liveScore()">
    <button class="icon-btn" style="width:34px;height:34px;flex:0 0 34px" onclick="draft._exp.splice(${i},1);paintExps();liveScore()"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="var(--loss)" stroke-width="2"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/></svg></button></div>`).join('');
}
async function saveProduct(){
  const g=id=>$('#'+id)?.value;
  if(!g('f_nome').trim()){toast('Dê um nome ao produto');return;}
  const btn=$('#saveProd');btn.textContent='Salvando…';btn.disabled=true;
  const row={nome:g('f_nome').trim(),categoria:g('f_cat'),condicao:g('f_cond'),marca:g('f_marca'),modelo:g('f_modelo'),cor:g('f_cor'),numero_serie:g('f_serial'),imei:g('f_imei'),garantia:g('f_gar'),status:g('f_status'),origem:g('f_origem'),fornecedor:g('f_forn'),cidade:g('f_cidade'),data_compra:g('f_data')||todayISO(),data_anuncio:g('f_dataAn')||null,preco_pago:numf(g('f_pago')),valor_mercado:numf(g('f_merc')),preco_anunciado:numf(g('f_anun')),preco_minimo:numf(g('f_min')),preco_ideal:numf(g('f_ideal')),link_anuncio:g('f_link'),observacoes:g('f_obs'),supplier_id:($('#f_supplier')&&$('#f_supplier').value)||null,garantia_ate:($('#f_gar_ate')&&$('#f_gar_ate').value)||null};
  try{
    let pid=draft.id;
    if(pid){await sb.from('products').update(row).eq('id',pid);}
    else{const {data,error}=await sb.from('products').insert(row).select().single();if(error)throw error;pid=data.id;}
    // photos upload
    for(const ph of draft._newPhotos){
      const path=`${USER.id}/${pid}/${uidStr()}.jpg`;
      const up=await sb.storage.from('product-images').upload(path,ph.blob,{contentType:'image/jpeg',upsert:false});
      if(!up.error){const pub=sb.storage.from('product-images').getPublicUrl(path).data.publicUrl;
        await sb.from('attachments').insert({product_id:pid,bucket:'product-images',path,kind:'image'});
        if(!draft.cover_url){draft.cover_url=pub;await sb.from('products').update({cover_url:pub}).eq('id',pid);}}
    }
    if(draft.id && !draft.cover_url){await sb.from('products').update({cover_url:null}).eq('id',pid);}
    // expenses sync
    const keepIds=draft._exp.filter(e=>e.id).map(e=>e.id);
    const orig=S.expenses.filter(e=>e.product_id===pid);
    for(const o of orig){if(!keepIds.includes(o.id))await sb.from('product_expenses').delete().eq('id',o.id);}
    for(const e of draft._exp){
      const payload={product_id:pid,descricao:e.descricao||'Despesa',valor:numf(e.valor),data:e.data||todayISO()};
      if(e.id)await sb.from('product_expenses').update(payload).eq('id',e.id);
      else if(numf(e.valor)>0||e.descricao)await sb.from('product_expenses').insert(payload);
    }
    await logAct(draft.id?'Produto editado':'Produto cadastrado','product',pid);
    await refresh('products');await refresh('expenses');
    closeModal();toast('Produto salvo');
    if(g('f_status')==='vendido'&&!S.sales.find(s=>s.product_id===pid)){openSale(pid);} else render();
  }catch(e){toast('Erro: '+(e.message||e));btn.textContent='Salvar';btn.disabled=false;}
}
function delProduct(id){confirmBox('Excluir produto?','Remove o produto, despesas e venda associados.',async()=>{await sb.from('products').delete().eq('id',id);await refresh();closeModal();toast('Excluído');render();});}

    ${(p.numero_serie||p.imei)?`<p style="font-size:12.5px;color:var(--text-2)">${p.numero_serie?'S/N: '+esc(p.numero_serie):''} ${p.imei?' · IMEI: '+esc(p.imei):''}</p>`:''}

/* ============ VENDA ============ */
function openSale(id){
  const p=S.products.find(x=>x.id===id);if(!p)return;const existing=S.sales.find(s=>s.product_id===id);
  window.permItems=[];const v=existing||{data_venda:todayISO(),valor_vendido:'',forma_pagamento:'Pix',comprador:''};const ct=derive(p).custo;
  openModal(`<div class="modal-head"><h3>Registrar venda</h3><button class="icon-btn" onclick="closeModal()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg></button></div>
  <p style="font-size:13.5px;color:var(--text-2);margin-top:4px">${esc(p.nome)} · custo ${brl(ct)}</p>
  <div class="frow"><div><label class="lbl">Data</label><input class="input" type="date" id="s_data" value="${v.data_venda}"></div><div><label class="lbl">Valor vendido (R$)</label><input class="input num" type="number" step="0.01" id="s_val" value="${v.valor_vendido}"></div><div><label class="lbl">Forma</label><select class="input" id="s_forma">${['Pix','Dinheiro','Cartão','Transferência','Outro'].map(x=>`<option ${x===v.forma_pagamento?'selected':''}>${x}</option>`).join('')}</select></div><div><label class="lbl">Comprador</label><input class="input" id="s_comp" value="${esc(v.comprador||'')}"></div></div>
  <div class="card" style="margin-top:12px;padding:14px"><label style="display:flex;justify-content:space-between;align-items:center;gap:10px;cursor:pointer"><span><b style="font-size:13.5px">Recebi um produto na venda</b><br><small style="color:var(--text-2)">Cliente pagou parte ou tudo com um item</small></span><input type="checkbox" id="s_permuta" onchange="togglePermuta()"></label><div id="permWrap" style="display:none;margin-top:10px"><div id="permList"></div><button class="btn btn-ghost btn-sm" style="width:auto" onclick="addPermItem()">+ Adicionar item</button><div id="permResumo" style="font-size:12px;color:var(--text-2);margin-top:8px"></div></div></div><div class="card" id="sPrev" style="margin-top:14px;padding:14px"></div>
  <div class="modal-foot">${existing?`<button class="btn btn-ghost" style="flex:0 0 auto" onclick="undoSale('${id}','${existing.id}')">Desfazer</button>`:''}<button class="btn btn-primary" id="saveSale">Confirmar</button></div>`);
  const upd=()=>{const val=numf($('#s_val').value),ll=val-ct,roi=ct>0?ll/ct*100:0,mg=val>0?ll/val*100:0;$('#sPrev').innerHTML=`<div class="dt-grid" style="margin:0"><div><div class="k">Lucro líquido</div><div class="v num ${ll>=0?'up':'down'}">${brl(ll)}</div></div><div><div class="k">ROI</div><div class="v num">${roi.toFixed(1)}%</div></div><div><div class="k">Margem</div><div class="v num">${mg.toFixed(1)}%</div></div><div><div class="k">Lucro bruto</div><div class="v num">${brl(val-numf(p.preco_pago))}</div></div></div>`;};
  $('#s_val').oninput=()=>{upd();permResumo();};upd();
  $('#saveSale').onclick=async()=>{
    const val=numf($('#s_val').value);if(val<=0){toast('Informe o valor');return;}
    const _po=$('#s_permuta')&&$('#s_permuta').checked;const _pit=_po?window.permItems.filter(it=>(it.nome||'').trim()):[];const _pv=_pit.reduce((a,it)=>a+numf(it.valor),0);const payload={product_id:id,data_venda:$('#s_data').value,valor_vendido:val,forma_pagamento:$('#s_forma').value,comprador:$('#s_comp').value.trim(),permuta_valor:_pv,permuta_itens:_pit.map(it=>({nome:(it.nome||'').trim(),valor:numf(it.valor)}))};
    if(existing)await sb.from('sales').update(payload).eq('id',existing.id);
    else await sb.from('sales').insert(payload);
    await sb.from('products').update({status:'vendido'}).eq('id',id);
    if(_pit.length){await sb.from('products').insert(_pit.map(it=>({nome:(it.nome||'').trim()||'Item recebido',preco_pago:numf(it.valor),valor_mercado:numf(it.valor),status:'comprado',condicao:'usado',categoria:'',origem:'Permuta',data_compra:todayISO()})));}
    await logAct('Venda registrada','sale',id);
    await refresh('sales');await refresh('products');closeModal();toast('Venda registrada 🎉');render();
  };
}
function undoSale(pid,sid){confirmBox('Desfazer venda?','O produto volta ao estoque como Anunciado.',async()=>{await sb.from('sales').delete().eq('id',sid);await sb.from('products').update({status:'anunciado'}).eq('id',pid);await refresh('sales');await refresh('products');closeModal();toast('Venda desfeita');render();});}

/* ============ ESTOQUE ============ */
function rEstoque(v){
  const s=stats();const stock=s.stock.slice().sort((a,b)=>derive(b).dias-derive(a).dias);
  const tiers=[15,30,60,90,120];const counts=tiers.map(t=>stock.filter(p=>derive(p).dias>=t).length);
  v.innerHTML=`<div class="grid kpis" style="grid-template-columns:repeat(2,1fr)">${kpi('Produtos em posse',stock.length)}${kpi('Investido',brl(s.estCusto))}${kpi('Valor de mercado',brl(s.estMercado))}${kpi('Lucro potencial',`<span class="${s.lucroPot>=0?'up':'down'}">${brl(s.lucroPot)}</span>`)}</div>
  <div class="sec-title"><h3>Alertas de parado</h3></div>
  <div class="grid kpis" style="grid-template-columns:repeat(5,1fr)">${tiers.map((t,i)=>`<div class="card kpi" style="padding:13px"><div class="lab">+${t} dias</div><div class="val num" style="font-size:20px;color:${counts[i]?'var(--loss)':'var(--text)'}">${counts[i]}</div></div>`).join('')}</div>
  <div class="sec-title"><h3>Estoque</h3><span class="hint">vermelho = parado +${s.tmEstoque?Math.round(S.settings.stale_days||30):30}d</span></div>`;
  if(!stock.length){v.innerHTML+=`<div class="empty"><b>Estoque vazio</b><p>Nada parado no momento.</p></div>`;return;}
  v.innerHTML+=`<div class="card scroll-x" style="padding:6px"><table class="tbl"><thead><tr><th>Produto</th><th>Score</th><th>Investido</th><th>Mercado</th><th>Lucro pot.</th><th>Dias</th></tr></thead><tbody>${stock.map(p=>{const d=derive(p);return `<tr ${d.stale?'style="color:var(--loss)"':''} onclick="openDetail('${p.id}')" style="cursor:pointer"><td><b>${esc(p.nome)}</b><br><small style="color:var(--text-3)"><span class="pill ${stClass(p.status)}">${stLabel(p.status)}</span></small></td><td><span class="pill sc-${p.opportunity_label}">${p.opportunity_score}</span></td><td class="num">${brl(d.custo)}</td><td class="num">${brl(p.valor_mercado)}</td><td class="num ${d.lucroPot>=0?'up':'down'}">${brl(d.lucroPot)}</td><td class="num"><b>${d.dias}</b></td></tr>`;}).join('')}</tbody></table></div>`;
}

function openCapital(){openModal(`<div class="modal-head"><h3>Capital inicial</h3><button class="icon-btn" onclick="closeModal()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg></button></div><p style="font-size:13.5px;color:var(--text-2)">Quanto havia em caixa para começar?</p><div class="field"><label class="lbl">Capital inicial (R$)</label><input class="input num" type="number" step="0.01" id="capIni" value="${S.settings.capital_inicial||''}"></div><div class="modal-foot"><button class="btn btn-primary" onclick="saveCapital()">Salvar</button></div>`);}
async function saveCapital(){const v=numf($('#capIni').value);await sb.from('settings').upsert({user_id:USER.id,capital_inicial:v},{onConflict:'user_id'});S.settings.capital_inicial=v;closeModal();toast('Capital atualizado');render();}
function rCaixa(v){
  const s=stats();const led=[];
  if(s.capIni)led.push({d:'',t:'Capital inicial',v:s.capIni,k:'in'});
  S.cash.forEach(c=>led.push({id:c.id,d:c.data,t:(c.kind==='aporte'?'Aporte':c.kind==='retirada'?'Retirada':'Ajuste')+(c.nota?' · '+c.nota:''),v:c.kind==='retirada'?-numf(c.valor):numf(c.valor),k:c.kind==='retirada'?'out':'in',ed:true}));
  S.products.forEach(p=>{const d=derive(p);led.push({d:p.data_compra,t:'Compra · '+p.nome,v:-d.custo,k:'out'});if(d.vendido)led.push({d:d.sale.data_venda,t:'Venda · '+p.nome,v:d.receita,k:'in'});});
  led.sort((a,b)=>(b.d||'').localeCompare(a.d||''));
  v.innerHTML=`<div class="hero"><div class="lab"><span class="dot" style="background:var(--profit)"></span> Capital em caixa</div><div class="big num">${brl(s.caixa)}</div><div class="row"><div class="mini"><b class="num">${brl(s.capIni)}</b><span>Inicial</span></div><div class="mini"><b class="num up">${brl(s.aportes)}</b><span>Aportes</span></div><div class="mini"><b class="num down">${brl(s.retiradas)}</b><span>Retiradas</span></div><div class="mini"><b class="num">${brl(s.estCusto)}</b><span>Em estoque</span></div></div></div>
  <div class="toolbar" style="margin-top:16px"><button class="btn btn-ghost" onclick="openCapital()">Capital inicial</button><button class="btn btn-ghost" style="color:var(--profit)" onclick="openMov('aporte')">+ Aporte</button><button class="btn btn-ghost" style="color:var(--loss)" onclick="openMov('retirada')">− Retirada</button></div>
  <div class="sec-title"><h3>Movimentações</h3><span class="hint">compras e vendas automáticas</span></div>
  <div class="card scroll-x" style="padding:6px"><table class="tbl"><thead><tr><th>Descrição</th><th>Data</th><th style="text-align:right">Valor</th></tr></thead><tbody>${led.map(l=>`<tr><td>${esc(l.t)}${l.ed?` <button onclick="delMov('${l.id}')" style="color:var(--loss);font-size:11px;font-weight:700">excluir</button>`:''}</td><td style="color:var(--text-2)">${l.d?fmtDate(l.d):'—'}</td><td class="num ${l.k==='in'?'up':'down'}" style="text-align:right">${l.v>=0?'+':''}${brl(l.v)}</td></tr>`).join('')}</tbody></table></div>`;
}
function openMov(kind){openModal(`<div class="modal-head"><h3>${kind==='aporte'?'Aporte':'Retirada'}</h3><button class="icon-btn" onclick="closeModal()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg></button></div><div class="frow"><div><label class="lbl">Valor (R$)</label><input class="input num" type="number" step="0.01" id="m_val"></div><div><label class="lbl">Data</label><input class="input" type="date" id="m_data" value="${todayISO()}"></div><div class="full"><label class="lbl">Descrição</label><input class="input" id="m_desc"></div></div><div class="modal-foot"><button class="btn btn-primary" onclick="saveMov('${kind}')">Salvar</button></div>`);}
async function saveMov(kind){const val=numf($('#m_val').value);if(val<=0){toast('Informe um valor');return;}await sb.from('cash_flow').insert({kind,valor:val,data:$('#m_data').value,nota:$('#m_desc').value});await refresh('cash');closeModal();toast('Registrado');render();}
function delMov(id){sb.from('cash_flow').delete().eq('id',id).then(async()=>{await refresh('cash');toast('Removido');render();});}

/* ============ METAS ============ */
function rMetas(v){
  const s=stats(),g=S.goals,yr=new Date().getFullYear();
  const lucroAno=s.sold.filter(p=>derive(p).sale.data_venda.slice(0,4)==yr).reduce((a,p)=>a+derive(p).lucroLiq,0);
  const fatAno=s.sold.filter(p=>derive(p).sale.data_venda.slice(0,4)==yr).reduce((a,p)=>a+derive(p).receita,0);
  const vendasMes=s.sold.filter(p=>monthKey(derive(p).sale.data_venda)===monthKey(todayISO())).length;
  const bar=(l,cur,tgt,fmt)=>{const p=tgt>0?Math.min(100,cur/tgt*100):0;return `<div class="card" style="margin-bottom:12px"><div style="display:flex;justify-content:space-between"><b style="font-size:14.5px">${l}</b><span class="num" style="font-weight:600;color:var(--text-2)">${fmt(cur)} / ${fmt(tgt)}</span></div><div class="prog"><i style="width:${p}%"></i></div><div style="font-size:12px;color:var(--text-2);margin-top:6px">${p.toFixed(0)}%${p>=100?' · batida 🎉':''}</div></div>`;};
  v.innerHTML=`<div class="toolbar"><button class="btn btn-ghost" onclick="openGoals()">Editar metas</button></div>
  ${bar('Lucro mensal',s.lucroMes,numf(g.lucro_mensal),brl)}${bar('Lucro anual',lucroAno,numf(g.lucro_anual),brl)}${bar('Faturamento anual',fatAno,numf(g.faturamento_mensal),brl)}${bar('Vendas no mês',vendasMes,numf(g.vendas_qtd),x=>x+'')}${bar('ROI médio',s.roiMedio,numf(g.roi_alvo),x=>x.toFixed(0)+'%')}${bar('Margem média',s.margemMedia,numf(g.margem_alvo),x=>x.toFixed(0)+'%')}`;
}
function openGoals(){const g=S.goals;openModal(`<div class="modal-head"><h3>Metas</h3><button class="icon-btn" onclick="closeModal()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg></button></div><div class="frow"><div><label class="lbl">Lucro mensal (R$)</label><input class="input num" type="number" id="g_m" value="${g.lucro_mensal||''}"></div><div><label class="lbl">Lucro anual (R$)</label><input class="input num" type="number" id="g_a" value="${g.lucro_anual||''}"></div><div><label class="lbl">Faturamento anual (R$)</label><input class="input num" type="number" id="g_f" value="${g.faturamento_mensal||''}"></div><div><label class="lbl">Vendas/mês</label><input class="input num" type="number" id="g_v" value="${g.vendas_qtd||''}"></div><div><label class="lbl">ROI alvo (%)</label><input class="input num" type="number" id="g_r" value="${g.roi_alvo||''}"></div><div><label class="lbl">Margem alvo (%)</label><input class="input num" type="number" id="g_mg" value="${g.margem_alvo||''}"></div></div><div class="modal-foot"><button class="btn btn-primary" onclick="saveGoals()">Salvar</button></div>`);}
async function saveGoals(){const row={user_id:USER.id,lucro_mensal:numf($('#g_m').value),lucro_anual:numf($('#g_a').value),faturamento_mensal:numf($('#g_f').value),vendas_qtd:numf($('#g_v').value),roi_alvo:numf($('#g_r').value),margem_alvo:numf($('#g_mg').value)};await sb.from('goals').upsert(row,{onConflict:'user_id'});S.goals={...S.goals,...row};closeModal();toast('Metas salvas');render();}

/* ============ INSIGHTS ============ */
function rIQ(v){
  const s=stats();
  if(!s.sold.length){v.innerHTML=`<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 18h6M10 22h4M12 2a7 7 0 0 0-4 12.7c.6.5 1 1.3 1 2.1h6c0-.8.4-1.6 1-2.1A7 7 0 0 0 12 2z"/></svg><b>Sem dados</b><p>Registre vendas para gerar insights.</p></div>`;return;}
  const sold=s.sold.map(p=>({p,d:derive(p)}));
  const byCat={};sold.forEach(x=>{const c=x.p.categoria||'Outros';byCat[c]=byCat[c]||{l:0,q:0,cu:0,dv:0};byCat[c].l+=x.d.lucroLiq;byCat[c].q++;byCat[c].cu+=x.d.custo;byCat[c].dv+=x.d.diasVenda;});
  const catK=Object.keys(byCat).sort((a,b)=>byCat[b].l-byCat[a].l);
  const byMonth={};sold.forEach(x=>{const k=monthKey(x.d.sale.data_venda);byMonth[k]=(byMonth[k]||0)+x.d.lucroLiq;});
  const bestMonth=Object.keys(byMonth).sort((a,b)=>byMonth[b]-byMonth[a])[0];
  const fast=[...sold].sort((a,b)=>a.d.diasVenda-b.d.diasVenda)[0];
  const slow=[...sold].sort((a,b)=>b.d.diasVenda-a.d.diasVenda)[0];
  const bestProd=[...sold].sort((a,b)=>b.d.lucroLiq-a.d.lucroLiq)[0];
  const bestRoi=[...sold].sort((a,b)=>b.d.roi-a.d.roi)[0];
  const ins=(ic,col,t,p)=>`<div class="insight"><div class="ic" style="background:var(--${col}-soft);color:var(--${col})">${ic}</div><div><b>${t}</b><p>${p}</p></div></div>`;
  const L=[];
  if(catK[0])L.push(ins('💰','profit','Categoria mais lucrativa',`Você lucra mais com <b>${esc(catK[0])}</b> — ${brl(byCat[catK[0]].l)} no total.`));
  if(catK.length>1)L.push(ins('📉','loss','Categoria menos lucrativa',`<b>${esc(catK[catK.length-1])}</b> traz o menor retorno acumulado.`));
  L.push(ins('📈','brand','ROI médio',`Seu ROI médio é de <b>${s.roiMedio.toFixed(1)}%</b> e a margem média <b>${s.margemMedia.toFixed(1)}%</b>.`));
  if(fast)L.push(ins('⚡','profit','Venda mais rápida',`<b>${esc(fast.p.nome)}</b> saiu em ${fast.d.diasVenda} dias.`));
  if(slow&&slow.d.diasVenda>20)L.push(ins('🐌','amber','Mais lento',`<b>${esc(slow.p.nome)}</b> levou ${slow.d.diasVenda} dias para vender.`));
  if(s.stock.length)L.push(ins('📦','amber','Oportunidade de giro',`${s.stock.filter(p=>derive(p).stale).length} produto(s) parados acima do limite. Reveja preço/anúncio.`));
  v.innerHTML=`<div class="sec-title" style="margin-top:4px"><h3>Insights automáticos</h3></div>${L.join('')}
  <div class="sec-title"><h3>Top produtos por lucro</h3></div><div class="card">${[...sold].sort((a,b)=>b.d.lucroLiq-a.d.lucroLiq).slice(0,5).map((x,i)=>`<div class="rank"><div class="pos ${i===0?'gold':''}">${i+1}</div><div><b>${esc(x.p.nome)}</b><br><small>ROI ${x.d.roi.toFixed(0)}% · ${x.d.diasVenda}d</small></div><div class="v up">${brl(x.d.lucroLiq)}</div></div>`).join('')}</div>
  <div class="sec-title"><h3>Categorias</h3></div><div class="card">${catK.map((k,i)=>`<div class="rank"><div class="pos ${i===0?'gold':''}">${i+1}</div><div><b>${esc(k)}</b><br><small>${byCat[k].q} venda(s) · ${(byCat[k].dv/byCat[k].q).toFixed(0)}d médio</small></div><div class="v up">${brl(byCat[k].l)}</div></div>`).join('')}</div>
  <div class="grid kpis" style="margin-top:18px;grid-template-columns:repeat(2,1fr)">${kpi('Melhor mês',bestMonth?mLabel(bestMonth):'—',`<div class="delta up">${bestMonth?brl(byMonth[bestMonth]):''}</div>`)}${kpi('Maior ROI',bestRoi?bestRoi.d.roi.toFixed(0)+'%':'—',`<div class="delta neu">${bestRoi?esc(bestRoi.p.nome):''}</div>`)}${kpi('Melhor venda',bestProd?brl(bestProd.d.lucroLiq):'—',`<div class="delta neu">${bestProd?esc(bestProd.p.nome):''}</div>`)}${kpi('Giro estimado',s.giro.toFixed(2)+'x')}</div>`;
}

/* ============ AUTO INSIGHTS -> NOTIFICATIONS ============ */
async function runAutoInsights(){
  try{
    const today=todayISO();const last=safeStorage.getItem('bp_insights_'+today);if(last)return;
    const news=[];const sd=S.settings.stale_days||30;
    S.products.forEach(p=>{const d=derive(p);if(!d.vendido){if(d.dias>sd)news.push({tipo:'alerta',titulo:'Produto parado',mensagem:`${p.nome} está há ${d.dias} dias em estoque.`});if(!p.cover_url)news.push({tipo:'info',titulo:'Produto sem foto',mensagem:`${p.nome} não tem foto cadastrada.`});}});
    S.negos.forEach(n=>{if(n.proximo_contato&&n.proximo_contato<=today&&!['comprado','perdido'].includes(n.stage))news.push({tipo:'crm',titulo:'Follow-up pendente',mensagem:`Retomar contato: ${n.titulo||n.nome}.`});});
    if(news.length){await sb.from('notifications').insert(news);await refresh('notifs');}
    safeStorage.setItem('bp_insights_'+today,'1');
  }catch(e){}
}
function openNotifs(){
  const list=S.notifs;
  openModal(`<div class="modal-head"><h3>Notificações</h3><button class="icon-btn" onclick="closeModal()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg></button></div>
  ${list.length?'':'<div class="empty"><b>Tudo em dia</b><p>Sem alertas no momento.</p></div>'}
  ${list.map(n=>`<div class="insight" style="margin-bottom:9px;${n.read?'opacity:.6':''}"><div class="ic" style="background:var(--${n.tipo==='alerta'?'loss':n.tipo==='crm'?'amber':'brand'}-soft);color:var(--${n.tipo==='alerta'?'loss':n.tipo==='crm'?'amber':'brand'})">${n.tipo==='alerta'?'⚠️':n.tipo==='crm'?'📞':'ℹ️'}</div><div><b>${esc(n.titulo)}</b><p>${esc(n.mensagem)}</p></div></div>`).join('')}
  ${list.length?'<div class="modal-foot"><button class="btn btn-ghost" onclick="markAllRead()">Marcar tudo como lido</button></div>':''}`);
}
async function markAllRead(){await sb.from('notifications').update({read:true}).eq('read',false);await refresh('notifs');closeModal();updateNotifBadge();}

/* ============ RELATÓRIOS ============ */
function rRel(v){
  v.innerHTML=`<div class="card"><h3 style="font-size:16px">Exportar</h3><p style="font-size:13px;color:var(--text-2);margin:6px 0 14px">Relatórios completos com vendas, custos e indicadores.</p><div style="display:flex;gap:10px;flex-wrap:wrap"><button class="btn btn-primary" style="width:auto" onclick="expPDF()">PDF</button><button class="btn btn-ghost" style="width:auto" onclick="expXLS()">Excel</button><button class="btn btn-ghost" style="width:auto" onclick="expCSV()">CSV</button></div></div>
  <div class="sec-title"><h3>Por mês</h3></div>${tablePeriod('mes')}<div class="sec-title"><h3>Por categoria</h3></div>${tableCat()}<div class="sec-title"><h3>Anual</h3></div>${tablePeriod('ano')}`;
}
function aggSold(fn){const m={};S.products.forEach(p=>{const d=derive(p);if(!d.vendido)return;const k=fn(p,d);m[k]=m[k]||{q:0,fat:0,cu:0,l:0};m[k].q++;m[k].fat+=d.receita;m[k].cu+=d.custo;m[k].l+=d.lucroLiq;});return m;}
function tablePeriod(type){const m=aggSold((p,d)=>type==='mes'?monthKey(d.sale.data_venda):d.sale.data_venda.slice(0,4));const ks=Object.keys(m).sort().reverse();if(!ks.length)return`<div class="empty"><p>Sem vendas.</p></div>`;return `<div class="card scroll-x" style="padding:6px"><table class="tbl"><thead><tr><th>${type==='mes'?'Mês':'Ano'}</th><th>Vendas</th><th>Faturamento</th><th>Lucro</th><th>ROI</th></tr></thead><tbody>${ks.map(k=>{const r=m[k];return `<tr><td><b>${type==='mes'?mLabel(k):k}</b></td><td class="num">${r.q}</td><td class="num">${brl(r.fat)}</td><td class="num ${r.l>=0?'up':'down'}">${brl(r.l)}</td><td class="num">${r.cu>0?(r.l/r.cu*100).toFixed(0):0}%</td></tr>`;}).join('')}</tbody></table></div>`;}
function tableCat(){const m=aggSold(p=>p.categoria||'Outros');const ks=Object.keys(m).sort((a,b)=>m[b].l-m[a].l);if(!ks.length)return`<div class="empty"><p>Sem vendas.</p></div>`;return `<div class="card scroll-x" style="padding:6px"><table class="tbl"><thead><tr><th>Categoria</th><th>Vendas</th><th>Faturamento</th><th>Lucro</th><th>Margem</th></tr></thead><tbody>${ks.map(k=>{const r=m[k];return `<tr><td><b>${esc(k)}</b></td><td class="num">${r.q}</td><td class="num">${brl(r.fat)}</td><td class="num ${r.l>=0?'up':'down'}">${brl(r.l)}</td><td class="num">${r.fat>0?(r.l/r.fat*100).toFixed(0):0}%</td></tr>`;}).join('')}</tbody></table></div>`;}
function soldRows(){return S.products.filter(p=>derive(p).vendido).map(p=>{const d=derive(p);return [p.nome,p.categoria||'',fmtDate(d.sale.data_venda),brl(d.custo),brl(d.receita),brl(d.lucroLiq),d.roi.toFixed(0)+'%'];});}

function expCSV(){const head=['Produto','Categoria','Status','Score','Custo','Vendido','Lucro','ROI%'];const rows=S.products.map(p=>{const d=derive(p);return [p.nome,p.categoria,stLabel(p.status),p.opportunity_score,d.custo.toFixed(2),d.vendido?d.receita.toFixed(2):'',d.vendido?d.lucroLiq.toFixed(2):'',d.vendido?d.roi.toFixed(1):''];});const csv=[head].concat(rows).map(r=>r.map(c=>`"${(''+c).replace(/"/g,'""')}"`).join(',')).join('\n');const blob=new Blob(['\ufeff'+csv],{type:'text/csv'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='brique-pro.csv';a.click();toast('CSV gerado');}

function compressBlob(file,max,q){return new Promise(res=>{const r=new FileReader();r.onload=()=>{const img=new Image();img.onload=()=>{let{width:w,height:h}=img;if(w>h&&w>max){h=h*max/w;w=max;}else if(h>max){w=w*max/h;h=max;}const c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);c.toBlob(b=>res(b),'image/jpeg',q);};img.src=r.result;};r.readAsDataURL(file);});}

function xicon(){return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>';}
function recvStats(){let recebido=0,areceber=0,atrasado=0;const t=todayISO();
  S.receivables.forEach(r=>{recebido+=numf(r.entrada);});
  S.installments.forEach(i=>{if(i.pago)recebido+=numf(i.valor);else if(i.vencimento&&i.vencimento<t)atrasado+=numf(i.valor);else areceber+=numf(i.valor);});
  return {recebido,areceber,atrasado};}
function rReceivables(v){const s=recvStats();
  v.innerHTML=`<div class="toolbar"><button class="btn btn-primary" style="width:auto" onclick="openRecv()">+ Nova conta a receber</button></div>
  <div class="grid kpis" style="grid-template-columns:repeat(3,1fr)">${kpi('Recebido',brl(s.recebido))}${kpi('A receber',brl(s.areceber))}${kpi('Atrasado','<span class="down">'+brl(s.atrasado)+'</span>')}</div>
  <div class="sec-title"><h3>Contas</h3><span class="hint">parcelamentos</span></div><div id="recvList"></div>`;
  paintRecv();}
function paintRecv(){const w=$('#recvList');if(!w)return;
  if(!S.receivables.length){w.innerHTML='<div class="empty"><b>Nenhuma conta a receber</b><p>Cadastre uma venda parcelada para acompanhar os recebimentos.</p></div>';return;}
  w.innerHTML=S.receivables.map(r=>{const ins=S.installments.filter(i=>i.receivable_id===r.id).sort((a,b)=>(a.numero||0)-(b.numero||0));
    const pagas=ins.filter(i=>i.pago).length;const total=numf(r.valor_total);
    const pago=numf(r.entrada)+ins.filter(i=>i.pago).reduce((a,i)=>a+numf(i.valor),0);
    const pct=total>0?Math.min(100,pago/total*100):0;
    const atrasada=ins.some(i=>!i.pago&&i.vencimento&&i.vencimento<todayISO());
    return `<div class="card hover" style="margin-bottom:12px;cursor:pointer" onclick="openRecvDetail('${r.id}')">
      <div style="display:flex;justify-content:space-between;align-items:center"><b>${esc(r.cliente||'Cliente')}</b><b class="num">${brl(total)}</b></div>
      <div style="font-size:12px;color:var(--text-2);margin:2px 0 8px">${esc(r.descricao||'—')} · ${pagas}/${ins.length} parcelas ${atrasada?'· <span class="down">em atraso</span>':''}</div>
      <div class="prog"><i style="width:${pct}%"></i></div></div>`;}).join('');}
function openRecv(){openModal(`<div class="modal-head"><h3>Nova conta a receber</h3><button class="icon-btn" onclick="closeModal()">${xicon()}</button></div>
  <div class="frow"><div class="full"><label class="lbl">Cliente</label><input class="input" id="r_cli"></div>
  <div class="full"><label class="lbl">Descrição</label><input class="input" id="r_desc" placeholder="Ex: iPhone 13 128GB"></div>
  <div><label class="lbl">Valor total (R$)</label><input class="input" type="number" step="0.01" id="r_total"></div>
  <div><label class="lbl">Entrada (R$)</label><input class="input" type="number" step="0.01" id="r_entrada" value="0"></div>
  <div><label class="lbl">Nº de parcelas</label><input class="input" type="number" id="r_parc" value="1" min="1"></div>
  <div><label class="lbl">1º vencimento</label><input class="input" type="date" id="r_data" value="${todayISO()}"></div></div>
  <div class="modal-foot"><button class="btn btn-primary" onclick="saveRecv()">Criar</button></div>`);}
async function saveRecv(){const cli=$('#r_cli').value.trim();const total=numf($('#r_total').value);const entrada=numf($('#r_entrada').value);
  const n=Math.max(1,parseInt($('#r_parc').value)||1);const first=$('#r_data').value||todayISO();
  if(total<=0){toast('Informe o valor total');return;}
  const ins=await sb.from('receivables').insert({cliente:cli,descricao:$('#r_desc').value.trim(),valor_total:total,entrada:entrada,data:todayISO()}).select().single();
  if(ins.error){toast('Erro: '+ins.error.message);return;}
  const rest=Math.max(0,total-entrada);const val=Math.round((rest/n)*100)/100;const rows=[];let d=new Date(first+'T00:00:00');
  for(let k=1;k<=n;k++){rows.push({receivable_id:ins.data.id,numero:k,vencimento:new Date(d).toISOString().slice(0,10),valor:val,pago:false});d.setMonth(d.getMonth()+1);}
  if(rows.length)await sb.from('receivable_installments').insert(rows);
  await refreshRecv();closeModal();toast('Conta criada');render();}
function openRecvDetail(id){const r=S.receivables.find(x=>x.id===id);if(!r)return;
  const ins=S.installments.filter(i=>i.receivable_id===id).sort((a,b)=>(a.numero||0)-(b.numero||0));
  openModal(`<div class="modal-head"><h3>${esc(r.cliente||'Cliente')}</h3><button class="icon-btn" onclick="closeModal()">${xicon()}</button></div>
  <p style="font-size:13px;color:var(--text-2);margin-bottom:6px">${esc(r.descricao||'')} · total ${brl(r.valor_total)} · entrada ${brl(r.entrada)}</p>
  ${ins.map(i=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border)">
    <div><b>Parcela ${i.numero}</b><br><small style="color:${(!i.pago&&i.vencimento&&i.vencimento<todayISO())?'var(--loss)':'var(--text-2)'}">vence ${fmtDate(i.vencimento)}</small></div>
    <div style="display:flex;align-items:center;gap:10px"><b class="num">${brl(i.valor)}</b>
    <button class="btn ${i.pago?'btn-ghost':'btn-primary'} btn-sm" onclick="toggleParc('${i.id}',${i.pago?'false':'true'},'${r.id}')">${i.pago?'Pago ✓':'Receber'}</button></div></div>`).join('')}
  <div class="modal-foot"><button class="btn btn-ghost" style="color:var(--loss)" onclick="delRecv('${r.id}')">Excluir conta</button></div>`);}
async function toggleParc(id,pago,rid){await sb.from('receivable_installments').update({pago:pago,data_pagamento:pago?todayISO():null}).eq('id',id);await refreshRecv();render();if(rid)openRecvDetail(rid);}
async function delRecv(id){await sb.from('receivables').delete().eq('id',id);await refreshRecv();closeModal();toast('Excluído');render();}
async function refreshRecv(){const a=await Promise.all([sb.from('receivables').select('*').order('created_at',{ascending:false}),sb.from('receivable_installments').select('*')]);S.receivables=a[0].data||[];S.installments=a[1].data||[];}

function rSuppliers(v){v.innerHTML=`<div class="toolbar"><button class="btn btn-primary" style="width:auto" onclick="openSup()">+ Fornecedor</button><button class="btn btn-ghost" style="width:auto" onclick="openQuote()">+ Orçamento</button></div><div class="sec-title"><h3>Fornecedores</h3><span class="hint">${S.suppliers.length}</span></div><div id="supList"></div><div class="sec-title" style="margin-top:18px"><h3>Orçamentos</h3><span class="hint">compare e acompanhe</span></div><div id="quoteList"></div>`;

  paintQuotes();}

   ${its.length?`<div style="margin-top:8px;font-size:12.5px">${its.map(it=>`<div style="display:flex;justify-content:space-between;color:var(--text-2);padding:2px 0"><span>${esc(it.nome)}${numf(it.qtd)>1?' ×'+numf(it.qtd):''}</span><span class="num">${brl(numf(it.preco)*(numf(it.qtd)||1))}</span></div>`).join('')}</div>`:''}

function openQuote(id){const ed=id?S.quotes.find(q=>q.id===id):null;const c=ed||{titulo:'',supplier_id:'',status:'pendente',itens:[]};

const SOURCES=[
 {id:'olx',name:'OLX',build:q=>'https://www.olx.com.br/brasil?q='+encodeURIComponent(q)},
 {id:'ml',name:'Mercado Livre',build:q=>'https://lista.mercadolivre.com.br/'+encodeURIComponent(q).replace(/%20/g,'-')},
 {id:'fb',name:'Facebook',build:q=>'https://www.facebook.com/marketplace/search/?query='+encodeURIComponent(q)},
 {id:'enjoei',name:'Enjoei',build:q=>'https://www.enjoei.com.br/busca?q='+encodeURIComponent(q)},
 {id:'shopee',name:'Shopee',build:q=>'https://shopee.com.br/search?keyword='+encodeURIComponent(q)},
];
function estVenda(cat){const sold=S.products.filter(p=>derive(p).vendido);const same=sold.filter(p=>(p.categoria||'')===cat&&cat);const arr=same.length?same:sold;if(!arr.length)return 0;return arr.reduce((a,p)=>a+derive(p).receita,0)/arr.length;}
function scoreOf(preco,vest,watch){
  if(watch&&(watch.preco_excelente||watch.preco_bom||watch.preco_max)){
    if(watch.preco_excelente&&preco<=numf(watch.preco_excelente))return {s:10,l:'Excelente'};
    if(watch.preco_bom&&preco<=numf(watch.preco_bom))return {s:8,l:'Boa'};
    if(watch.preco_max&&preco<=numf(watch.preco_max))return {s:5,l:'Aceitável'};
    return {s:2,l:'Pouca margem'};}
  const m=vest>0?(vest-preco)/vest*100:0;
  if(m>=30)return {s:10,l:'Excelente'};if(m>=20)return {s:8,l:'Boa'};if(m>=12)return {s:5,l:'Média'};if(m>=5)return {s:3,l:'Baixa'};return {s:1,l:'Pouca margem'};}
function rRadar(v){const novas=S.opps.filter(o=>o.status==='nova');const exc=novas.filter(o=>o.score>=8).length;const fav=S.opps.filter(o=>o.favorito).length;
  const lucroPot=novas.reduce((a,o)=>a+Math.max(0,numf(o.preco_venda_est)-numf(o.preco)),0);
  v.innerHTML=`<div class="grid kpis" style="grid-template-columns:repeat(2,1fr)">${kpi('Oportunidades novas',novas.length)}${kpi('Excelentes',exc)}${kpi('Favoritas',fav)}${kpi('Lucro potencial',brl(lucroPot))}</div>
  <div class="sec-title"><h3>Lista de desejos</h3><button class="btn btn-ghost btn-sm" style="width:auto" onclick="openWatch()">+ Produto</button></div><div id="watchList"></div>
  <div class="sec-title" style="margin-top:18px"><h3>Oportunidades</h3><button class="btn btn-primary btn-sm" style="width:auto" onclick="openOpp()">+ Registrar</button></div><div id="oppList"></div>`;
  paintWatch();paintOpps();}
function srcButtons(produto,cidade){const q=cidade?produto+' '+cidade:produto;return '<div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:8px">'+SOURCES.map(x=>'<a class="btn btn-ghost btn-sm" style="width:auto" target="_blank" rel="noopener" href="'+x.build(q)+'">'+x.name+'</a>').join('')+'</div>';}
function paintWatch(){const w=$('#watchList');if(!w)return;
  if(!S.watch.length){w.innerHTML='<div class="empty"><b>Nenhum produto monitorado</b><p>Cadastre o que você procura e busque em todas as plataformas com 1 toque.</p></div>';return;}
  w.innerHTML=S.watch.map(it=>`<div class="card" style="margin-bottom:12px">
    <div style="display:flex;justify-content:space-between;align-items:flex-start"><div><b>${esc(it.produto)}</b><div style="font-size:12px;color:var(--text-2)">${esc(it.cidade||'Brasil')}${it.categoria?' · '+esc(it.categoria):''}</div></div><button class="icon-btn" onclick="openWatch('${it.id}')">✎</button></div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;font-size:11px">${it.preco_excelente?'<span class="pill st-comprado">excelente ≤ '+brl(it.preco_excelente)+'</span>':''}${it.preco_bom?'<span class="pill st-anunciado">bom ≤ '+brl(it.preco_bom)+'</span>':''}${it.preco_max?'<span class="pill">máx ≤ '+brl(it.preco_max)+'</span>':''}</div>
    ${srcButtons(it.produto,it.cidade)}</div>`).join('');}
function openWatch(id){const ed=id?S.watch.find(w=>w.id===id):null;const c=ed||{produto:'',categoria:'',cidade:'',preco_max:'',preco_bom:'',preco_excelente:''};
  openModal(`<div class="modal-head"><h3>${ed?'Editar produto':'Monitorar produto'}</h3><button class="icon-btn" onclick="closeModal()">${xicon()}</button></div>
  <div class="frow"><div class="full"><label class="lbl">Produto</label><input class="input" id="w_prod" value="${esc(c.produto)}" placeholder="Ex: iPhone 15 128GB"></div>
  <div><label class="lbl">Categoria</label><input class="input" id="w_cat" value="${esc(c.categoria)}" placeholder="iphone, ps5..."></div>
  <div><label class="lbl">Cidade</label><input class="input" id="w_cid" value="${esc(c.cidade)}"></div>
  <div><label class="lbl">Excelente ≤ (R$)</label><input class="input" type="number" id="w_exc" value="${c.preco_excelente||''}"></div>
  <div><label class="lbl">Bom ≤ (R$)</label><input class="input" type="number" id="w_bom" value="${c.preco_bom||''}"></div>
  <div><label class="lbl">Máximo ≤ (R$)</label><input class="input" type="number" id="w_max" value="${c.preco_max||''}"></div></div>
  <div class="modal-foot">${ed?`<button class="btn btn-ghost" style="color:var(--loss)" onclick="delWatch('${id}')">Excluir</button>`:''}<button class="btn btn-primary" onclick="saveWatch(${ed?("'"+id+"'"):'null'})">Salvar</button></div>`);}
async function saveWatch(id){const row={produto:$('#w_prod').value.trim(),categoria:$('#w_cat').value.trim(),cidade:$('#w_cid').value.trim(),preco_excelente:numf($('#w_exc').value)||null,preco_bom:numf($('#w_bom').value)||null,preco_max:numf($('#w_max').value)||null};
  if(!row.produto){toast('Informe o produto');return;}
  const r=id?await sb.from('watchlist').update(row).eq('id',id):await sb.from('watchlist').insert(row);
  if(r.error){toast('Erro: '+r.error.message);return;}
  S.watch=(await sb.from('watchlist').select('*').order('created_at',{ascending:false})).data||[];closeModal();toast('Salvo');render();}
async function delWatch(id){await sb.from('watchlist').delete().eq('id',id);S.watch=(await sb.from('watchlist').select('*').order('created_at',{ascending:false})).data||[];closeModal();render();}
function paintOpps(){const w=$('#oppList');if(!w)return;const ops=S.opps.slice().sort((a,b)=>((b.favorito?1:0)-(a.favorito?1:0))||(b.score-a.score));
  if(!ops.length){w.innerHTML='<div class="empty"><b>Nenhuma oportunidade registrada</b><p>Achou um anúncio bom? Registre e veja o lucro e o score na hora.</p></div>';return;}
  w.innerHTML=ops.map(o=>{const lucro=numf(o.preco_venda_est)-numf(o.preco);const margem=numf(o.preco_venda_est)>0?lucro/numf(o.preco_venda_est)*100:0;const sc=o.score>=8?'up':o.score>=5?'':'down';const dim=o.status!=='nova'?'opacity:.55;':'';
   return `<div class="card" style="margin-bottom:12px;${dim}"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div><b>${esc(o.titulo)}</b><div style="font-size:12px;color:var(--text-2)">${esc(o.fonte)}${o.cidade?' · '+esc(o.cidade):''}${o.status!=='nova'?' · '+esc(o.status):''}</div></div><div style="text-align:right"><div class="num ${sc}" style="font-weight:800;font-size:18px">${o.score}/10</div><div style="font-size:10px;color:var(--text-2)">${esc(o.label||'')}</div></div></div>
   <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px"><div><div style="font-size:11px;color:var(--text-2)">Preço</div><div class="num" style="font-weight:700">${brl(o.preco)}</div></div><div><div style="font-size:11px;color:var(--text-2)">Venda est.</div><div class="num" style="font-weight:700">${brl(o.preco_venda_est)}</div></div><div><div style="font-size:11px;color:var(--text-2)">Lucro</div><div class="num ${lucro>=0?'up':'down'}" style="font-weight:700">${brl(lucro)} · ${margem.toFixed(0)}%</div></div></div>
   <div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;align-items:center">${o.link?`<a class="btn btn-primary btn-sm" style="width:auto" target="_blank" rel="noopener" href="${esc(o.link)}">Abrir anúncio</a>`:''}<button class="btn btn-ghost btn-sm" style="width:auto" onclick="favOpp('${o.id}',${o.favorito?'false':'true'})">${o.favorito?'★ Favorita':'☆ Favoritar'}</button>${o.status==='nova'?`<button class="btn btn-ghost btn-sm" style="width:auto" onclick="setOpp('${o.id}','comprada')">Comprei</button><button class="btn btn-ghost btn-sm" style="width:auto" onclick="setOpp('${o.id}','descartada')">Descartar</button>`:`<button class="btn btn-ghost btn-sm" style="width:auto" onclick="setOpp('${o.id}','nova')">Reabrir</button>`}<button class="icon-btn" style="margin-left:auto" onclick="delOpp('${o.id}')">${xicon()}</button></div></div>`;}).join('');}
function openOpp(){const cats=[...new Set(S.products.map(p=>p.categoria).filter(Boolean))];
  openModal(`<div class="modal-head"><h3>Registrar oportunidade</h3><button class="icon-btn" onclick="closeModal()">${xicon()}</button></div>
  <div class="frow"><div class="full"><label class="lbl">Título do anúncio</label><input class="input" id="o_tit" placeholder="Ex: iPhone 15 128GB seminovo"></div>
  <div><label class="lbl">Preço pedido (R$)</label><input class="input" type="number" step="0.01" id="o_preco" oninput="oppCalc()"></div>
  <div><label class="lbl">Categoria</label><input class="input" id="o_cat" list="o_cats" oninput="oppCalc()"><datalist id="o_cats">${cats.map(c=>'<option value="'+esc(c)+'">').join('')}</datalist></div>
  <div><label class="lbl">Venda estimada (R$)</label><input class="input" type="number" step="0.01" id="o_vest" oninput="oppCalc()"></div>
  <div><label class="lbl">Fonte</label><select class="input" id="o_fonte">${SOURCES.map(x=>'<option>'+x.name+'</option>').join('')}<option>Outro</option></select></div>
  <div class="full"><label class="lbl">Link do anúncio</label><input class="input" id="o_link" placeholder="https://"></div>
  <div><label class="lbl">Cidade</label><input class="input" id="o_cid"></div></div>
  <div id="o_analise" class="card" style="margin-top:6px;text-align:center;padding:12px"><span style="color:var(--text-2);font-size:12px">Preencha preço e venda estimada para ver o score.</span></div>
  <div class="modal-foot"><button class="btn btn-primary" onclick="saveOpp()">Salvar oportunidade</button></div>`);
  setTimeout(oppCalc,40);}
function oppCalc(){const catEl=$('#o_cat');const cat=catEl?catEl.value:'';let vest=numf($('#o_vest').value);
  if(!vest){const sug=estVenda(cat);if(sug&&$('#o_vest'))$('#o_vest').placeholder='sugestão: '+brl(sug);vest=sug;}
  const preco=numf($('#o_preco').value);const r=scoreOf(preco,vest,null);const lucro=vest-preco;const margem=vest>0?lucro/vest*100:0;const el=$('#o_analise');if(!el)return;
  if(!preco||!vest){el.innerHTML='<span style="color:var(--text-2);font-size:12px">Preencha preço e venda estimada para ver o score.</span>';return;}
  const sc=r.s>=8?'up':r.s>=5?'':'down';
  el.innerHTML='<div style="display:flex;justify-content:space-around;align-items:center"><div><div class="num '+sc+'" style="font-size:22px;font-weight:800">'+r.s+'/10</div><div style="font-size:11px;color:var(--text-2)">'+r.l+'</div></div><div><div class="num '+(lucro>=0?'up':'down')+'" style="font-size:18px;font-weight:800">'+brl(lucro)+'</div><div style="font-size:11px;color:var(--text-2)">lucro · '+margem.toFixed(0)+'%</div></div></div>';}
async function saveOpp(){const titulo=$('#o_tit').value.trim();const preco=numf($('#o_preco').value);const cat=$('#o_cat').value.trim();let vest=numf($('#o_vest').value)||estVenda(cat);
  if(!titulo){toast('Informe o título');return;}if(preco<=0){toast('Informe o preço');return;}
  const r=scoreOf(preco,vest,null);
  const row={titulo,preco,preco_venda_est:vest,categoria:cat,fonte:$('#o_fonte').value,link:$('#o_link').value.trim(),cidade:$('#o_cid').value.trim(),score:r.s,label:r.l,status:'nova'};
  const ins=await sb.from('opportunities').insert(row);if(ins.error){toast('Erro: '+ins.error.message);return;}
  S.opps=(await sb.from('opportunities').select('*').order('created_at',{ascending:false})).data||[];
  closeModal();toast(r.s>=8?('Oportunidade '+r.l.toLowerCase()+'! ('+r.s+'/10)'):'Oportunidade salva');render();}

/* ===== BRIQPRO Fase 4: Painel Master ===== */
function statusPill(st){const map={active:'st-anunciado',trialing:'st-comprado',suspended:'st-cancelado',canceled:'st-arquivado',past_due:'st-manutencao'};return '<span class="pill '+(map[st]||'')+'">'+(st||'sem assinatura')+'</span>';}
async function rMaster(v){
  if(!(PROFILE&&PROFILE.is_master)){v.innerHTML='<div class="empty"><b>Acesso restrito</b><p>Apenas o administrador da plataforma.</p></div>';return;}
  v.innerHTML='<div class="spinner"></div>';
  let users=[],m=null;
  try{const a=await Promise.all([sb.rpc('master_metrics'),sb.rpc('master_list_users')]);m=a[0].data;users=a[1].data||[];}
  catch(e){v.innerHTML='<div class="empty"><b>Erro ao carregar</b><p>'+esc(e.message||String(e))+'</p></div>';return;}
  const kp=m?`<div class="grid kpis" style="grid-template-columns:repeat(3,1fr)">${kpi('Usuários',m.usuarios)}${kpi('Ativas',m.ativos)}${kpi('Em teste',m.trial)}${kpi('MRR',brl(m.mrr))}${kpi('Cancelados',m.cancelados)}${kpi('Novos 30d',m.novos_30d)}</div>`:'';
  v.innerHTML=kp+`<div class="sec-title"><h3>Usuários</h3><span class="hint">${users.length}</span></div><div id="muList"></div>`;
  paintMU(users);}
function paintMU(users){const w=$('#muList');if(!w)return;
  if(!users.length){w.innerHTML='<div class="empty"><b>Nenhum usuário ainda</b></div>';return;}
  w.innerHTML=users.map(u=>{const blocked=u.sub_status==='suspended';
    return `<div class="card" style="margin-bottom:12px">
    <div style="display:flex;justify-content:space-between;align-items:flex-start"><div><b>${esc(u.full_name||u.email)}</b><div style="font-size:12px;color:var(--text-2)">${esc(u.email)}${u.is_master?' · <span class="up">master</span>':''}</div></div>${statusPill(u.sub_status)}</div>
    <div style="display:flex;gap:14px;margin-top:8px;font-size:12px;color:var(--text-2);flex-wrap:wrap"><span>${u.produtos||0} produtos</span><span>${u.vendas||0} vendas</span><span>plano: ${esc(u.sub_plan||'—')}</span></div>
    ${u.is_master?'':`<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;align-items:center">
      <button class="btn ${blocked?'btn-primary':'btn-ghost'} btn-sm" style="width:auto${blocked?'':';color:var(--loss)'}" onclick="mBlock('${u.id}',${blocked?'false':'true'})">${blocked?'Liberar':'Bloquear'}</button>
      <select class="input" style="width:auto;padding:6px 10px" onchange="mPlan('${u.id}',this.value)"><option value="">trocar plano…</option><option value="starter" ${u.sub_plan==='starter'?'selected':''}>Starter</option><option value="pro" ${u.sub_plan==='pro'?'selected':''}>Pro</option><option value="elite" ${u.sub_plan==='elite'?'selected':''}>Elite</option></select>
      <button class="btn btn-ghost btn-sm" style="width:auto" onclick="mReset('${esc(u.email)}')">Resetar senha</button></div>`}</div>`;}).join('');}
async function mBlock(id,suspend){try{await sb.rpc('master_set_status',{target:id,st:suspend?'suspended':'active'});toast(suspend?'Usuário bloqueado':'Usuário liberado');}catch(e){toast('Erro: '+(e.message||e));}rMaster($('#view'));}
async function mPlan(id,pl){if(!pl)return;try{await sb.rpc('master_set_plan',{target:id,pl:pl});toast('Plano atualizado');}catch(e){toast('Erro: '+(e.message||e));}rMaster($('#view'));}
async function mReset(email){try{await sb.auth.resetPasswordForEmail(email);toast('Link de redefinição enviado para '+email);}catch(e){toast('Erro: '+(e.message||e));}}
Object.assign(window,{rMaster,mBlock,mPlan,mReset});

(async function boot(){

  if(data.session){await onLogin();}else{renderAuth();}
  sb.auth.onAuthStateChange((ev,sess)=>{if(ev==='PASSWORD_RECOVERY'){authMode='login';toast('Defina uma nova senha em Configurações');}});
})();
